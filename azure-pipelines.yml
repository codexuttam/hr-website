trigger:
  - main

variables:
  - name: dockerRegistryServiceConnection
    value: 'BitlanceACRConnection'
  - name: containerRegistry
    value: 'bitlanceaiapp.azurecr.io'
  - name: tag
    value: '$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: Build and Push Stage
    jobs:
      - job: BuildAndPush
        displayName: Build and Push Images
        pool:
          vmImage: $(vmImageName)
        steps:
          # 1. Build & Push Frontend (as a Docker container)
          - task: Docker@2
            displayName: "Build & Push Frontend"
            inputs:
              command: buildAndPush
              repository: 'hr-website-frontend'
              dockerfile: '$(Build.SourcesDirectory)/frontend/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
              arguments: |
                --build-arg NEXT_PUBLIC_SUPABASE_URL=$(NEXT_PUBLIC_SUPABASE_URL)
                --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$(NEXT_PUBLIC_SUPABASE_ANON_KEY)
                --build-arg SUPABASE_SERVICE_ROLE_KEY=$(SUPABASE_SERVICE_ROLE_KEY)

          # 2. Build & Push Backend
          - task: Docker@2
            displayName: "Build & Push Backend"
            inputs:
              command: buildAndPush
              repository: 'hr-website-backend'
              dockerfile: '$(Build.SourcesDirectory)/backend/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

          # 3. Build & Push Agents
          - task: Docker@2
            displayName: "Build & Push Agents"
            inputs:
              command: buildAndPush
              repository: 'hr-website-agents'
              dockerfile: '$(Build.SourcesDirectory)/agents/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
